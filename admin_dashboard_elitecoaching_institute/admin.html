<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVerse Institute Admin | Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <a class="brand" href="../home_elitecoaching_institute/code.html">
          <span class="brand-mark">EV</span>
          <span class="brand-copy">
            <strong>EduVerse</strong>
            <small>Institute Admin Portal</small>
          </span>
        </a>
        <button class="icon-button collapse-button" id="collapseSidebar" aria-label="Collapse sidebar">
          <span class="material-symbols-outlined">left_panel_close</span>
        </button>
      </div>

      <nav class="nav-list" id="adminNav" aria-label="Admin navigation">
        <button class="nav-item active" data-page="dashboard"><span class="material-symbols-outlined">dashboard</span><span class="nav-label">Dashboard</span></button>

        <p class="nav-section">Management</p>
        <button class="nav-item" data-page="teachers"><span class="material-symbols-outlined">co_present</span><span class="nav-label">Teachers</span></button>
        <button class="nav-item" data-page="students"><span class="material-symbols-outlined">school</span><span class="nav-label">Students</span></button>
        <button class="nav-item" data-page="approvals"><span class="material-symbols-outlined">approval</span><span class="nav-label">Content Approval</span><span class="nav-badge">12</span></button>
        <button class="nav-item" data-page="batches"><span class="material-symbols-outlined">groups</span><span class="nav-label">Batch Management</span></button>
        <button class="nav-item" data-page="attendance"><span class="material-symbols-outlined">fact_check</span><span class="nav-label">Attendance</span></button>

        <p class="nav-section">Operations</p>
        <button class="nav-item" data-page="payments"><span class="material-symbols-outlined">payments</span><span class="nav-label">Fees & Payments</span></button>
        <button class="nav-item" data-page="certificates"><span class="material-symbols-outlined">workspace_premium</span><span class="nav-label">Certificates</span></button>
        <button class="nav-item" data-page="reports"><span class="material-symbols-outlined">monitoring</span><span class="nav-label">Reports</span></button>
        <button class="nav-item" data-page="communication"><span class="material-symbols-outlined">campaign</span><span class="nav-label">Communication</span><span class="nav-badge purple">6</span></button>

        <p class="nav-section">Governance</p>
        <button class="nav-item" data-page="settings"><span class="material-symbols-outlined">settings</span><span class="nav-label">Institute Settings</span></button>
        <button class="nav-item" data-page="profile"><span class="material-symbols-outlined">account_circle</span><span class="nav-label">Profile</span></button>
        <a class="nav-item" href="../auth_elitecoaching_institute/auth.html?mode=login"><span class="material-symbols-outlined">logout</span><span class="nav-label">Logout</span></a>
      </nav>

      <div class="sidebar-user">
        <div class="avatar">AV</div>
        <span class="brand-copy">
          <strong>Aakash Verma</strong>
          <small>Institute Admin</small>
        </span>
        <span class="material-symbols-outlined brand-copy">more_vert</span>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button mobile-menu" id="mobileMenu" aria-label="Open navigation"><span class="material-symbols-outlined">menu</span></button>
          <div>
            <p class="breadcrumb">EduVerse / <span id="breadcrumb">Dashboard</span></p>
            <h1 id="pageTitle">Institute Dashboard</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <label class="global-search">
            <span class="material-symbols-outlined">search</span>
            <input type="search" id="globalSearch" placeholder="Search teachers, students, batches, invoices..." />
            <kbd>Ctrl K</kbd>
          </label>
          <select class="select" id="academicYearSelector" aria-label="Academic year">
            <option>AY 2026-27</option>
            <option>AY 2027-28</option>
          </select>
          <button class="button primary" id="quickCreateButton"><span class="material-symbols-outlined">add</span>Quick Create</button>
          <button class="icon-button" id="themeToggle" aria-label="Toggle dark mode"><span class="material-symbols-outlined">dark_mode</span></button>
          <button class="icon-button notification-button" data-open-page="approvals" aria-label="Notifications"><span class="material-symbols-outlined">notifications</span><i>6</i></button>
          <button class="admin-chip" data-open-page="profile">
            <span class="avatar small">AV</span>
            <span><strong>Aakash Verma</strong><small>Institute Admin</small></span>
            <span class="material-symbols-outlined">expand_more</span>
          </button>
        </div>
      </header>

      <main class="content" id="pageContent" aria-live="polite"></main>
    </div>
  </div>

  <div class="command-palette" id="commandPalette" role="dialog" aria-modal="true" aria-label="Quick navigation">
    <div class="command-box">
      <div class="command-search">
        <span class="material-symbols-outlined">search</span>
        <input id="commandInput" placeholder="Go to a module..." />
        <kbd>Esc</kbd>
      </div>
      <div id="commandResults"></div>
    </div>
  </div>

  <div class="toast" id="toast"><span class="material-symbols-outlined">check_circle</span><span id="toastText">Action completed</span></div>
  <button class="ai-fab" id="aiAssistant"><span class="material-symbols-outlined">auto_awesome</span><span>Ask EduVerse AI</span></button>

  <script src="js/script.js"></script>
</body>
</html>
